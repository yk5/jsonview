<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Viewer</title>
<style>
{{CSS}}
</style>
</head>
<body>

<header>
  <h1>{}
    <span>
      <a href="https://yk5.github.io/jsonview/" id="ghpage" target="_blank">jsonview</a>
      <a href="https://github.com/yk5/jsonview" id="githubLink" target="_blank">(GitHub)</a>
    </span>
  </h1>
  <button id="btnModules">Modules</button>
  <div class="toolbar">
    <label class="file-btn">
      Load
      <input type="file" id="fileInput" accept=".json,application/json">
    </label>
    <button id="btnEdit">Edit</button>
    <button id="btnFold" style="white-space:normal;line-height:1.3;text-align:center;">Fold all</button>
    <button id="btnExpand" style="white-space:normal;line-height:1.3;text-align:center;">Expand all</button>
  </div>
</header>

<div class="panels">
  <div class="panel" id="schemaPanel">
    <div class="panel-header">
      <span>Schema</span>
      <div class="panel-header-left"></div>
      <div class="panel-header-right"></div>
    </div>
    <div class="panel-body" id="schemaTree">
      <div class="empty-state">Load a JSON file<br>to view its schema</div>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="panel" id="dataPanel">
    <div class="panel-header">
      <div class="panel-header-left"></div>
      <div class="panel-header-right"></div>
      <span>Data</span>
    </div>
    <div class="panel-body" id="dataTree">
      <div class="empty-state">Load a JSON file<br>to view its contents</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editorOverlay">
  <div class="modal">
    <div class="modal-bar">
      <span id="editorTitle">Edit JSON</span>
      <div class="modal-actions">
        <button id="btnFormat">Format</button>
        <button id="btnApply" class="btn-apply">Apply</button>
        <button id="btnCancel">Cancel</button>
      </div>
    </div>
    <div class="modal-error" id="editorError"></div>
    <div class="editor-wrap">
      <div class="editor-lines" id="editorLines"></div>
      <textarea class="editor-area" id="editorArea" spellcheck="false"></textarea>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modulesOverlay">
  <div class="modal modules-modal">
    <div class="modal-bar">
      <span>Modules</span>
      <div class="modal-actions">
        <button id="btnAddModule">+ Add</button>
        <button id="btnModulesClose">Close</button>
      </div>
    </div>
    <div class="modules-list" id="modulesList"></div>
  </div>
</div>

<script>
{{JS}}
</script>
</body>
</html>
