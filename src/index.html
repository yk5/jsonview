<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

  /* ── Variables ─────────────────────────────────── */
  :root {
    --bg:               #0e0f13;
    --surface:          #16171d;
    --surface2:         #1e1f27;
    --border:           #2a2b35;
    --text:             #c9cad4;
    --text-dim:         #6b6d7b;

    --accent:           #6ee7b7;
    --accent-dim:       rgba(110,231,183,0.08);
    --accent-hover:     rgba(110,231,183,0.18);
    --accent-border:    rgba(110,231,183,0.25);

    --type-string:  #7dd3fc;
    --type-number:  #c4b5fd;
    --type-bool:    #fca5a5;
    --type-null:    #6b6d7b;
    --type-obj:     #6ee7b7;
    --type-arr:     #fdba74;

    --radius: 6px;
    --mono:   'IBM Plex Mono', monospace;
    --sans:   'DM Sans', sans-serif;
  }

  /* ── Reset ──────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Base layout ────────────────────────────────── */
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header & toolbar ───────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  header h1 span { color: var(--text-dim); font-weight: 400; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  /* ── Buttons & inputs ───────────────────────────── */
  button, label.file-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  button:hover, label.file-btn:hover {
    border-color: var(--accent-border);
    background: var(--accent-hover);
    color: var(--accent);
  }

  button:disabled {
    opacity: 0.35;
    cursor: default;
    border-color: var(--border);
    background: var(--surface2);
    color: var(--text-dim);
  }

  input[type="file"] { display: none; }

  /* ── Panels ─────────────────────────────────────── */
  .panels {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .panel + .panel { border-left: 1px solid var(--border); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 40px;
    padding: 0 16px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  /* Panel header zones */
  .panel-header > span { margin-left: 0.5em; margin-right: 0.5em; }

  .panel-header-left, .panel-header-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .panel-header-right { justify-content: flex-end; }

  /* Flex group inside panel headers */
  .btn-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-group--tight { gap: 4px; }

  .panel-body {
    flex: 1;
    overflow: auto;
    padding: 12px 8px;
  }

  .panel-body::-webkit-scrollbar       { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Resizer ─────────────────────────────────────── */
  .resizer {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .resizer:hover, .resizer.active { background: var(--accent-border); }

  /* ── Tree nodes ──────────────────────────────────── */
  .node { position: relative; }

  .node-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    padding: 2px 6px 2px calc(var(--depth, 0) * 18px + 6px);
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.1s;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: nowrap;
  }

  .node-row:hover  { background: var(--surface2); }
  .node-row.dimmed { opacity: 0.3; }

  .toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 10px;
    transition: transform 0.15s;
    user-select: none;
  }

  .toggle.folded { transform: rotate(-90deg); }
  .toggle.leaf      { visibility: hidden; }

  .key    { color: var(--text); }
  .colon  { color: var(--text-dim); margin-right: 4px; }
  .bracket { color: var(--text-dim); }
  .count  { color: var(--text-dim); font-size: 11px; margin-left: 4px; }

  .type-tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
  }

  .t-string  { color: var(--type-string); background: rgba(125,211,252,0.08); }
  .t-number  { color: var(--type-number); background: rgba(196,181,253,0.08); }
  .t-boolean { color: var(--type-bool);   background: rgba(252,165,165,0.08); }
  .t-null    { color: var(--type-null);   background: rgba(107,109,123,0.10); }
  .t-object  { color: var(--type-obj);    background: rgba(110,231,183,0.08); }
  .t-array   { color: var(--type-arr);    background: rgba(253,186,116,0.08); }

  .value     { margin-left: 2px; }
  .v-string  { color: var(--type-string); }
  .v-number  { color: var(--type-number); }
  .v-boolean { color: var(--type-bool); }
  .v-null    { color: var(--type-null); font-style: italic; }

  .children        { overflow: hidden; }
  .children.hidden { display: none; }

  /* ── Empty state ─────────────────────────────────── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }

  /* ── Editor / Modules modal ──────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: min(90vw, 720px);
    height: min(80vh, 600px);
    display: flex;
    flex-direction: column;
    transform: translateY(12px);
    transition: transform 0.2s;
    overflow: hidden;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .modal-bar span {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .modal-bar .modal-actions { display: flex; gap: 8px; }

  .modal-error {
    padding: 0 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--type-bool);
    height: 24px;
    line-height: 24px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .editor-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: var(--bg);
  }

  .editor-lines {
    padding: 12px 8px 12px 0;
    width: 48px;
    flex-shrink: 0;
    text-align: right;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
    background: var(--surface2);
    border-right: 1px solid var(--border);
    overflow: hidden;
    user-select: none;
  }

  .editor-area {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 12px 16px;
    tab-size: 2;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto;
  }

  /* ── Modules popup ───────────────────────────────── */
  .modules-modal {
    height: auto;
    max-height: min(80vh, 600px);
    min-height: 200px;
  }

  .modules-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .modules-list::-webkit-scrollbar       { width: 6px; }
  .modules-list::-webkit-scrollbar-track { background: transparent; }
  .modules-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .module-item {
    border-bottom: 1px solid var(--border);
  }

  .module-item:last-child { border-bottom: none; }

  .module-item-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
  }

  .module-item-info {
    flex: 1;
    min-width: 0;
  }

  .module-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: block;
  }

  .module-desc {
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-top: 2px;
  }

  .module-item-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-module-edit {
    padding: 3px 9px;
    font-size: 11px;
  }

  /* Toggle switch */
  .toggle-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    gap: 6px;
    user-select: none;
  }

  .toggle-switch input { display: none; }

  .toggle-track {
    width: 34px;
    height: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    position: relative;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.2s;
  }

  .toggle-switch input:checked + .toggle-track {
    background: var(--accent-dim);
    border-color: var(--accent-border);
  }

  .toggle-switch input:checked + .toggle-track .toggle-thumb {
    left: 18px;
    background: var(--accent);
  }

  /* Module code editor (embedded in module item) */
  .module-editor {
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    max-height: 380px;
  }

  .module-editor.hidden { display: none; }

  .module-editor-error {
    padding: 0 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--type-bool);
    height: 22px;
    line-height: 22px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .module-editor-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

</style>
</head>
<body>

<header>
  <h1>{} <span>json viewer</span></h1>
  <button id="btnModules">Modules</button>
  <div class="toolbar">
    <label class="file-btn">
      Load
      <input type="file" id="fileInput" accept=".json,application/json">
    </label>
    <button id="btnEdit">Edit</button>
    <button id="btnFold" disabled style="white-space:normal;line-height:1.3;text-align:center;">Fold all</button>
    <button id="btnExpand" disabled style="white-space:normal;line-height:1.3;text-align:center;">Expand all</button>
  </div>
</header>

<div class="panels">
  <div class="panel" id="schemaPanel">
    <div class="panel-header">
      <span>Schema</span>
      <div class="panel-header-left"></div>
      <div class="panel-header-right"></div>
    </div>
    <div class="panel-body" id="schemaTree">
      <div class="empty-state">Load a JSON file<br>to view its schema</div>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="panel" id="dataPanel">
    <div class="panel-header">
      <div class="panel-header-left"></div>
      <div class="panel-header-right"></div>
      <span>Data</span>
    </div>
    <div class="panel-body" id="dataTree">
      <div class="empty-state">Load a JSON file<br>to view its contents</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editorOverlay">
  <div class="modal">
    <div class="modal-bar">
      <span id="editorTitle">Edit JSON</span>
      <div class="modal-actions">
        <button id="btnFormat">Format</button>
        <button id="btnApply" class="btn-apply">Apply</button>
        <button id="btnCancel">Cancel</button>
      </div>
    </div>
    <div class="modal-error" id="editorError"></div>
    <div class="editor-wrap">
      <div class="editor-lines" id="editorLines"></div>
      <textarea class="editor-area" id="editorArea" spellcheck="false"></textarea>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modulesOverlay">
  <div class="modal modules-modal">
    <div class="modal-bar">
      <span>Modules</span>
      <div class="modal-actions">
        <button id="btnAddModule">+ Add</button>
        <button id="btnModulesClose">Close</button>
      </div>
    </div>
    <div class="modules-list" id="modulesList"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────
let schemaNodes  = new Map();   // path → { el, childrenEl, depth, isContainer, path }
let dataNodes    = new Map();   // path → { el, childrenEl, depth, isContainer, path }
let currentJson  = undefined;
let activeLevels = null;        // Set<number> | null

// ── Utilities ────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function dataPathToSchemaPath(path) {
  return path.replace(/\[\d+\]/g, "[]");
}

function typeClass(t) {
  const map = { string: "t-string", number: "t-number", boolean: "t-boolean", null: "t-null", object: "t-object", array: "t-array" };
  return map[t] || "";
}

function valueClass(t) {
  const map = { string: "v-string", number: "v-number", boolean: "v-boolean", null: "v-null" };
  return map[t] || "";
}

// ── Schema inference ─────────────────────────────────
function inferSchema(value, path = "$", depth = 0) {
  if (value === null)        return { type: "null",   path, depth };
  if (Array.isArray(value)) {
    const node = { type: "array", path, depth };
    if (value.length > 0) {
      node.items = inferSchema(value[0], path + "[]", depth + 1);
      for (let i = 1; i < Math.min(value.length, 20); i++) {
        mergeSchema(node.items, inferSchema(value[i], path + "[]", depth + 1));
      }
    }
    return node;
  }
  if (typeof value === "object") {
    const node = { type: "object", path, depth, children: {} };
    for (const k of Object.keys(value)) {
      node.children[k] = inferSchema(value[k], path + "." + k, depth + 1);
    }
    return node;
  }
  return { type: typeof value, path, depth };
}

function mergeSchema(target, source) {
  if (target.type !== source.type) return;
  if (source.children) {
    if (!target.children) target.children = {};
    for (const k of Object.keys(source.children)) {
      if (target.children[k]) mergeSchema(target.children[k], source.children[k]);
      else target.children[k] = source.children[k];
    }
  }
  if (source.items) {
    if (target.items) mergeSchema(target.items, source.items);
    else target.items = source.items;
  }
}

// ── Tree rendering ───────────────────────────────────
function renderSchemaTree(container, schema, key) {
  const isContainer = schema.type === "object" || schema.type === "array";
  const div = document.createElement("div");
  div.className = "node";

  const row = document.createElement("div");
  row.className = "node-row";
  row.style.setProperty("--depth", String(schema.depth));
  row.dataset.schemaPath = schema.path;
  row.dataset.container  = isContainer ? "1" : "0";

  const toggleSpan = document.createElement("span");
  toggleSpan.className = "toggle" + (isContainer ? "" : " leaf");
  toggleSpan.textContent = "▼";

  let label = "";
  if (key !== undefined) label += `<span class="key">${escapeHtml(key)}</span><span class="colon">:</span>`;
  label += `<span class="type-tag ${typeClass(schema.type)}">${schema.type}</span>`;

  row.appendChild(toggleSpan);
  row.insertAdjacentHTML("beforeend", label);
  div.appendChild(row);

  let childrenDiv = null;
  if (isContainer) {
    childrenDiv = document.createElement("div");
    childrenDiv.className = "children";
    if (schema.children) {
      for (const [k, v] of Object.entries(schema.children)) renderSchemaTree(childrenDiv, v, k);
    }
    if (schema.items) renderSchemaTree(childrenDiv, schema.items, "[]");
    div.appendChild(childrenDiv);

    row.addEventListener("click", (e) => {
      if (!e.ctrlKey && !e.metaKey) { e.stopPropagation(); toggleNode(toggleSpan, childrenDiv); }
    });
  }

  schemaNodes.set(schema.path, { el: row, childrenEl: childrenDiv, path: schema.path, depth: schema.depth, isContainer });
  container.appendChild(div);
}

function renderDataTree(container, value, path = "$", depth = 0, key) {
  const type = value === null ? "null" : Array.isArray(value) ? "array" : typeof value;
  const isContainer = type === "object" || type === "array";
  const div = document.createElement("div");
  div.className = "node";

  const row = document.createElement("div");
  row.className = "node-row";
  row.style.setProperty("--depth", String(depth));
  const schemaPath = dataPathToSchemaPath(path);
  row.dataset.path       = path;
  row.dataset.schemaPath = schemaPath;
  row.dataset.container  = isContainer ? "1" : "0";

  const toggleSpan = document.createElement("span");
  toggleSpan.className = "toggle" + (isContainer ? "" : " leaf");
  toggleSpan.textContent = "▼";

  let label = "";
  if (key !== undefined) label += `<span class="key">${escapeHtml(key)}</span><span class="colon">:</span>`;

  if (isContainer) {
    const count   = type === "array" ? value.length : Object.keys(value).length;
    const [open]  = type === "array" ? ["[", "]"] : ["{", "}"];
    const unit    = type === "array" ? "items" : "keys";
    label += `<span class="bracket">${open}</span><span class="count">${count} ${unit}</span>`;
  } else {
    const display = type === "string" ? `"${escapeHtml(String(value))}"` : String(value);
    label += `<span class="value ${valueClass(type)}">${display}</span>`;
  }

  row.appendChild(toggleSpan);
  row.insertAdjacentHTML("beforeend", label);
  div.appendChild(row);

  let childrenDiv = null;
  if (isContainer) {
    childrenDiv = document.createElement("div");
    childrenDiv.className = "children";
    if (type === "array") {
      value.forEach((item, i) => renderDataTree(childrenDiv, item, `${path}[${i}]`, depth + 1, String(i)));
    } else {
      for (const [k, v] of Object.entries(value)) renderDataTree(childrenDiv, v, `${path}.${k}`, depth + 1, k);
    }
    div.appendChild(childrenDiv);

    row.addEventListener("click", (e) => {
      if (!e.ctrlKey && !e.metaKey) { e.stopPropagation(); toggleNode(toggleSpan, childrenDiv); }
    });
  }

  dataNodes.set(path, { el: row, childrenEl: childrenDiv, path, depth, isContainer });
  container.appendChild(div);
}

// ── Fold / expand ────────────────────────────────────
function toggleNode(toggle, children) {
  const folded = !children.classList.contains("hidden");
  children.classList.toggle("hidden", folded);
  toggle.classList.toggle("folded", folded);

  if (folded || !activeLevels) return;

  for (const child of children.children) {
    if (!child.classList.contains("node")) continue;
    child.style.display = "";
    const childRow = child.querySelector(":scope > .node-row");
    if (childRow) {
      const d = parseInt(childRow.style.getPropertyValue("--depth"), 10);
      childRow.classList.toggle("dimmed", !activeLevels.has(d));
    }
  }
}

function setAllExpanded(nodes, expanded) {
  activeLevels = null;
  nodes.forEach(n => {
    n.el.classList.remove("dimmed");
    const wrapper = n.el.parentElement;
    if (wrapper?.classList.contains("node")) wrapper.style.display = "";
    if (n.childrenEl) {
      n.childrenEl.classList.toggle("hidden", !expanded);
      n.el.querySelector(".toggle")?.classList.toggle("folded", !expanded);
    }
  });
}

function isAncestorPath(parent, child) {
  if (!child.startsWith(parent) || child === parent) return false;
  const next = child[parent.length];
  return next === "." || next === "[";
}

// ── Resizer ──────────────────────────────────────────
function initResizer() {
  const resizer     = document.getElementById("resizer");
  const schemaPanel = document.getElementById("schemaPanel");
  let startX, startW;

  resizer.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    startW = schemaPanel.getBoundingClientRect().width;
    resizer.classList.add("active");

    const onMove = (e) => {
      schemaPanel.style.flex  = "none";
      schemaPanel.style.width = Math.max(200, startW + (e.clientX - startX)) + "px";
    };
    const onUp = () => {
      resizer.classList.remove("active");
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}

// ── Load JSON ────────────────────────────────────────
function loadJson(json, schemaContainer, dataContainer) {
  schemaNodes.clear();
  dataNodes.clear();
  activeLevels = null;
  schemaContainer.innerHTML = "";
  dataContainer.innerHTML   = "";
  moduleShared.postLoad.forEach(fn => fn());
  renderSchemaTree(schemaContainer, inferSchema(json));
  renderDataTree(dataContainer, json);
}

// ── Module System ────────────────────────────────────
const modules = new Map();
// id → { id, def, codeStr, enabled }

// moduleShared starts minimal — module functions and state are added dynamically on registration
const moduleShared = {
  get schemaNodes() { return schemaNodes; },
  get dataNodes()   { return dataNodes; },
  get activeLevels()  { return activeLevels; },
  set activeLevels(v) { activeLevels = v; },
  setAllExpanded,
  dataPathToSchemaPath,
  isAncestorPath,
  postLoad: [],   // callbacks registered by modules, called at the start of each loadJson
};

function evalModuleDef(codeStr) {
  return (new Function("return (" + codeStr + ")"))();
}

// Add a module's functions to moduleShared, bound to moduleShared as context
function _registerFunctions(def) {
  if (!def.functions) return;
  for (const [name, fn] of Object.entries(def.functions)) {
    moduleShared[name] = typeof fn === "function" ? fn.bind(moduleShared) : fn;
  }
}

// Remove a module's functions from moduleShared
function _unregisterFunctions(def) {
  if (!def.functions) return;
  for (const name of Object.keys(def.functions)) {
    delete moduleShared[name];
  }
}

function registerModule(codeStr) {
  const def = evalModuleDef(codeStr);
  const id = def.name;
  _registerFunctions(def);
  modules.set(id, { id, def, codeStr, enabled: false });
  enableModule(id);
}

const BUTTON_SLOTS = {
  'toolbar':             () => document.querySelector('header .toolbar'),
  'schema.header.left':  () => document.querySelector('#schemaPanel .panel-header-left'),
  'schema.header.right': () => document.querySelector('#schemaPanel .panel-header-right'),
  'data.header.left':    () => document.querySelector('#dataPanel .panel-header-left'),
  'data.header.right':   () => document.querySelector('#dataPanel .panel-header-right'),
};

function enableModule(id) {
  const mod = modules.get(id);
  if (!mod || mod.enabled) return;

  // Inject CSS
  if (mod.def.styles) {
    const el = document.createElement("style");
    el.id = "mod-style-" + id;
    el.textContent = mod.def.styles;
    document.head.appendChild(el);
  }

  // Inject button groups into the specified button slot zones
  if (mod.def.buttons) {
    for (const [slot, html] of Object.entries(mod.def.buttons)) {
      const parent = BUTTON_SLOTS[slot]?.();
      if (parent) {
        const wrapper = document.createElement("div");
        wrapper.id = "mod-slot-" + id + "-" + slot.replace(/\./g, "-");
        wrapper.className = "btn-group btn-group--tight";
        wrapper.innerHTML = html;
        parent.appendChild(wrapper);
        if (currentJson !== undefined) {
          wrapper.querySelectorAll("button").forEach(el => el.disabled = false);
        }
      }
    }
  }

  // Call init with scoped DOM references
  const schemaDom = document.getElementById("schemaTree");
  const dataDom   = document.getElementById("dataTree");
  mod.def.init?.call(mod.def, schemaDom, dataDom, moduleShared);

  mod.enabled = true;
}

function disableModule(id) {
  const mod = modules.get(id);
  if (!mod || !mod.enabled) return;

  // Call destroy (buttons still in DOM at this point)
  mod.def.destroy?.call(mod.def);

  // Remove injected button slots
  if (mod.def.buttons) {
    for (const slot of Object.keys(mod.def.buttons)) {
      document.getElementById("mod-slot-" + id + "-" + slot.replace(/\./g, "-"))?.remove();
    }
  }

  // Remove injected CSS
  document.getElementById("mod-style-" + id)?.remove();

  mod.enabled = false;
  // Note: functions stay in moduleShared until removeModule is called
}

function removeModule(id) {
  disableModule(id);
  const mod = modules.get(id);
  if (mod) _unregisterFunctions(mod.def);
  modules.delete(id);
}

function applyModuleCode(id, newCode) {
  const mod = modules.get(id);
  if (!mod) return;
  const wasEnabled = mod.enabled;
  if (wasEnabled) disableModule(id);
  // Swap out functions: remove old, add new
  _unregisterFunctions(mod.def);
  mod.def    = evalModuleDef(newCode);
  mod.codeStr = newCode;
  _registerFunctions(mod.def);
  if (wasEnabled) enableModule(id);
}

// ── Module definitions ────────────────────────────────

const SHOW_LEVELS_MODULE_CODE =
`({
  name: 'Show Levels',
  description: 'Filter both panels to show only nodes at specified depth levels (e.g. 0-2,4)',
  functions: {
    parseLevels(input) {
      var levels = new Set();
      input.split(',').forEach(function(part) {
        var trimmed = part.trim();
        if (!trimmed) return;
        var range = trimmed.split('-').map(function(s) { return parseInt(s.trim(), 10); });
        if (range.length === 1 && !isNaN(range[0])) {
          levels.add(range[0]);
        } else if (range.length === 2 && !isNaN(range[0]) && !isNaN(range[1])) {
          for (var i = range[0]; i <= range[1]; i++) levels.add(i);
        }
      });
      return levels;
    },
    applyLevels(nodes, levels) {
      this.activeLevels = levels;
      var activePaths = new Set();
      nodes.forEach(function(n, path) { if (levels.has(n.depth)) activePaths.add(path); });
      var ancestorPaths = new Set();
      nodes.forEach(function(n, path) {
        if (!n.childrenEl) return;
        for (var ap of activePaths) {
          if (this.isAncestorPath(path, ap)) { ancestorPaths.add(path); break; }
        }
      }.bind(this));
      nodes.forEach(function(n, path) {
        var isActive   = activePaths.has(path);
        var isAncestor = ancestorPaths.has(path);
        n.el.classList.toggle('dimmed', isAncestor && !isActive);
        if (n.childrenEl) {
          n.childrenEl.classList.toggle('hidden', !isAncestor);
          n.el.querySelector('.toggle')?.classList.toggle('folded', !isAncestor);
        }
        var wrapper = n.el.parentElement;
        if (wrapper?.classList.contains('node')) wrapper.style.display = (isActive || isAncestor) ? '' : 'none';
      });
    },
  },
  styles: \`
    .level-group {
      display: flex;
      align-items: stretch;
    }
    .level-input {
      font-family: var(--mono);
      font-size: 12px;
      width: 100px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .level-input:focus { border-color: var(--accent-border); }
    .level-input::placeholder { color: var(--text-dim); }
    .btn-levels {
      border-radius: 0 var(--radius) var(--radius) 0;
      border-left: none;
    }
    .level-group:focus-within .level-input,
    .level-group:focus-within .btn-levels { border-color: var(--accent-border); }
  \`,
  buttons: {
    'toolbar': \`
      <div class="level-group">
        <input class="level-input" id="levelInput" placeholder="e.g. 0-2,4">
        <button id="btnLevels" class="btn-levels">levels</button>
      </div>
    \`
  },
  init(schemaDom, dataDom, shared) {
    this._shared = shared;
    this._input  = document.getElementById('levelInput');
    this._btn    = document.getElementById('btnLevels');
    this._click  = () => {
      var levels = shared.parseLevels(this._input.value);
      if (levels.size === 0) return;
      shared.applyLevels(shared.schemaNodes, levels);
      shared.applyLevels(shared.dataNodes,   levels);
    };
    this._keydown = (e) => { if (e.key === 'Enter') this._btn.click(); };
    this._btn.addEventListener('click',   this._click);
    this._input.addEventListener('keydown', this._keydown);
    this._postLoadFn = () => { this._input.value = ''; };
    shared.postLoad.push(this._postLoadFn);
  },
  destroy() {
    this._btn?.removeEventListener('click',   this._click);
    this._input?.removeEventListener('keydown', this._keydown);
    var arr = this._shared?.postLoad;
    if (arr) { var i = arr.indexOf(this._postLoadFn); if (i !== -1) arr.splice(i, 1); }
    delete this._shared; delete this._input; delete this._btn;
  },
})`;

const SCHEMA_FOLDING_CODE =
`({
  name: 'Schema Folding',
  description: 'Apply Folding copies the Schema panel expand/fold state into the Data panel',
  functions: {
    applySchemaFoldingToData() {
      this.dataNodes.forEach(function(dn, dataPath) {
        if (!dn.childrenEl) return;
        var sn = this.schemaNodes.get(this.dataPathToSchemaPath(dataPath));
        if (!sn?.childrenEl) return;
        var folded = sn.childrenEl.classList.contains('hidden');
        dn.childrenEl.classList.toggle('hidden', folded);
        dn.el.querySelector('.toggle')?.classList.toggle('folded', folded);
      }.bind(this));
    },
  },
  styles: \`
    .btn-apply-schema-folding {
      padding: 3px 9px;
      font-size: 11px;
      letter-spacing: 0.3px;
      text-transform: none;
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn-apply-schema-folding:hover { background: var(--accent-hover); }
  \`,
  buttons: {
    'schema.header.left': \`
      <button class="btn-apply-schema-folding" id="btnApplySchemaFolding" disabled
        title="Copy the Schema panel's expand/fold state into the Data panel">Apply Folding &#x25B6;</button>
    \`
  },
  init(schemaDom, dataDom, shared) {
    this._handler = () => shared.applySchemaFoldingToData();
    document.getElementById('btnApplySchemaFolding')?.addEventListener('click', this._handler);
  },
  destroy() {
    document.getElementById('btnApplySchemaFolding')?.removeEventListener('click', this._handler);
  }
})`;

// ── Init ─────────────────────────────────────────────
function init() {
  const fileInput   = document.getElementById("fileInput");
  const schemaTree  = document.getElementById("schemaTree");
  const dataTree    = document.getElementById("dataTree");

  const btnFold        = document.getElementById("btnFold");
  const btnExpand      = document.getElementById("btnExpand");

  const overlay      = document.getElementById("editorOverlay");
  const editorArea   = document.getElementById("editorArea");
  const editorLines  = document.getElementById("editorLines");
  const editorError  = document.getElementById("editorError");
  const editorTitle  = document.getElementById("editorTitle");
  const btnEdit      = document.getElementById("btnEdit");
  const btnApply     = document.getElementById("btnApply");
  const btnCancel    = document.getElementById("btnCancel");
  const btnFormat    = document.getElementById("btnFormat");

  initResizer();

  // ── Register modules ──
  registerModule(SHOW_LEVELS_MODULE_CODE);
  registerModule(SCHEMA_FOLDING_CODE);

  // ── Toolbar controls ──
  function enableControls() {
    [btnFold, btnExpand].forEach(el => el.disabled = false);
    document.querySelectorAll("[id^='mod-slot-'] button").forEach(el => el.disabled = false);
  }

  btnFold.addEventListener("click", () => { setAllExpanded(schemaNodes, false); setAllExpanded(dataNodes, false); });
  btnExpand.addEventListener("click",   () => { setAllExpanded(schemaNodes, true);  setAllExpanded(dataNodes, true);  });

  // ── File loading ──
  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        currentJson = json;
        loadJson(json, schemaTree, dataTree);
        enableControls();
      } catch {
        schemaTree.innerHTML = '<div class="empty-state">Invalid JSON</div>';
        dataTree.innerHTML   = '<div class="empty-state">Invalid JSON</div>';
      }
    };
    reader.readAsText(file);
  });

  // ── Editor modal ──
  let editorMode = null; // null = JSON, string = module id

  function updateLineNumbers() {
    const count = editorArea.value.split("\n").length;
    editorLines.innerHTML = Array.from({ length: count }, (_, i) => `<div>${i + 1}</div>`).join("");
  }

  function openEditor(mode) {
    editorMode = mode;
    editorError.textContent = "";

    if (mode === null) {
      editorTitle.textContent = "Edit JSON";
      editorArea.value = currentJson !== undefined ? JSON.stringify(currentJson, null, 2) : '{\n  \n}';
    } else {
      const mod = modules.get(mode);
      editorTitle.textContent = "Module: " + (mod?.def.name || mode);
      editorArea.value = mod?.codeStr || "";
    }

    updateLineNumbers();
    overlay.classList.add("open");
    requestAnimationFrame(() => {
      editorArea.focus();
      if (mode === null && currentJson === undefined) editorArea.selectionStart = editorArea.selectionEnd = 4;
    });
  }

  function closeEditor() { overlay.classList.remove("open"); }

  btnEdit.addEventListener("click",   () => openEditor(null));
  btnCancel.addEventListener("click", closeEditor);
  overlay.addEventListener("click",  (e) => { if (e.target === overlay) closeEditor(); });

  editorArea.addEventListener("input",  updateLineNumbers);
  editorArea.addEventListener("scroll", () => { editorLines.scrollTop = editorArea.scrollTop; });

  btnFormat.addEventListener("click", () => {
    if (editorMode !== null) return; // no formatting for module code
    try {
      editorArea.value = JSON.stringify(JSON.parse(editorArea.value), null, 2);
      editorError.textContent = "";
      updateLineNumbers();
    } catch (err) {
      editorError.textContent = "⚠ " + err.message;
    }
  });

  btnApply.addEventListener("click", () => {
    if (editorMode !== null) {
      // Apply module code
      try {
        applyModuleCode(editorMode, editorArea.value);
        editorError.textContent = "";
        closeEditor();
      } catch (err) {
        editorError.textContent = "⚠ " + err.message;
      }
    } else {
      // Apply JSON
      try {
        currentJson = JSON.parse(editorArea.value);
        loadJson(currentJson, schemaTree, dataTree);
        enableControls();
        closeEditor();
      } catch (err) {
        editorError.textContent = "⚠ " + err.message;
      }
    }
  });

  editorArea.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const s = editorArea.selectionStart;
      editorArea.value = editorArea.value.substring(0, s) + "  " + editorArea.value.substring(editorArea.selectionEnd);
      editorArea.selectionStart = editorArea.selectionEnd = s + 2;
      updateLineNumbers();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") btnApply.click();
  });

  // ── Modules popup ──
  const modulesOverlay  = document.getElementById("modulesOverlay");
  const modulesList     = document.getElementById("modulesList");
  const btnModules      = document.getElementById("btnModules");
  const btnModulesClose = document.getElementById("btnModulesClose");
  const btnAddModule    = document.getElementById("btnAddModule");

  function buildModulesList() {
    modulesList.innerHTML = "";
    modules.forEach((mod, id) => {
      const item = document.createElement("div");
      item.className = "module-item";
      item.dataset.moduleId = id;

      item.innerHTML = `
        <div class="module-item-header">
          <div class="module-item-info">
            <span class="module-name">${escapeHtml(mod.def.name || id)}</span>
            <span class="module-desc">${escapeHtml(mod.def.description || "")}</span>
          </div>
          <div class="module-item-controls">
            <button class="btn-module-edit">Edit</button>
            <button class="btn-module-remove" title="Remove module">Remove</button>
            <label class="toggle-switch" title="${mod.enabled ? "Disable" : "Enable"} module">
              <input type="checkbox" ${mod.enabled ? "checked" : ""}>
              <div class="toggle-track"><div class="toggle-thumb"></div></div>
            </label>
          </div>
        </div>
        <div class="module-editor hidden">
          <div class="module-editor-error"></div>
          <div class="editor-wrap">
            <div class="editor-lines"></div>
            <textarea class="editor-area" spellcheck="false"></textarea>
          </div>
          <div class="module-editor-actions">
            <button class="btn-apply btn-module-apply">Apply</button>
            <button class="btn-module-discard">Discard</button>
          </div>
        </div>`;

      const toggle     = item.querySelector("input[type=checkbox]");
      const editBtn    = item.querySelector(".btn-module-edit");
      const removeBtn  = item.querySelector(".btn-module-remove");
      const editorDiv  = item.querySelector(".module-editor");
      const errDiv     = item.querySelector(".module-editor-error");
      const textarea   = item.querySelector("textarea");
      const linesDiv   = item.querySelector(".editor-lines");
      const applyBtn   = item.querySelector(".btn-module-apply");
      const discardBtn = item.querySelector(".btn-module-discard");

      function updateLines() {
        const count = textarea.value.split("\n").length;
        linesDiv.innerHTML = Array.from({ length: count }, (_, i) => `<div>${i + 1}</div>`).join("");
      }

      toggle.addEventListener("change", () => {
        if (toggle.checked) enableModule(id);
        else disableModule(id);
        buildModulesList();
      });

      removeBtn.addEventListener("click", () => {
        if (!confirm(`Remove module "${mod.def.name || id}"?`)) return;
        removeModule(id);
        buildModulesList();
      });

      editBtn.addEventListener("click", () => {
        if (!editorDiv.classList.contains("hidden")) {
          editorDiv.classList.add("hidden");
          editBtn.textContent = "Edit";
          return;
        }
        textarea.value = modules.get(id)?.codeStr || "";
        updateLines();
        errDiv.textContent = "";
        editorDiv.classList.remove("hidden");
        editBtn.textContent = "Close";
        textarea.focus();
      });

      textarea.addEventListener("input", updateLines);
      textarea.addEventListener("scroll", () => { linesDiv.scrollTop = textarea.scrollTop; });

      textarea.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const s = textarea.selectionStart;
          textarea.value = textarea.value.substring(0, s) + "  " + textarea.value.substring(textarea.selectionEnd);
          textarea.selectionStart = textarea.selectionEnd = s + 2;
          updateLines();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") applyBtn.click();
      });

      applyBtn.addEventListener("click", () => {
        try {
          applyModuleCode(id, textarea.value);
          errDiv.textContent = "";
          textarea.value = modules.get(id)?.codeStr || textarea.value;
          buildModulesList(); // refresh names/descriptions
        } catch (err) {
          errDiv.textContent = "⚠ " + err.message;
        }
      });

      discardBtn.addEventListener("click", () => {
        textarea.value = modules.get(id)?.codeStr || "";
        updateLines();
        errDiv.textContent = "";
        editorDiv.classList.add("hidden");
        editBtn.textContent = "Edit";
      });

      modulesList.appendChild(item);
    });
  }

  btnModules.addEventListener("click", () => {
    buildModulesList();
    modulesOverlay.classList.add("open");
  });

  btnModulesClose.addEventListener("click", () => modulesOverlay.classList.remove("open"));
  modulesOverlay.addEventListener("click", (e) => { if (e.target === modulesOverlay) modulesOverlay.classList.remove("open"); });

  const BLANK_MODULE_CODE =
`({
  name: 'New Module',
  description: '',
  // functions: exported to moduleShared on registration, stay available even when disabled
  functions: {
  },
  styles: \`\`,
  buttons: {},
  init(schemaDom, dataDom, shared) {
  },
  destroy() {
  }
})`;

  btnAddModule.addEventListener("click", () => {
    const id = "Module_" + Date.now();
    const def = evalModuleDef(BLANK_MODULE_CODE);
    _registerFunctions(def);
    modules.set(id, { id, def, codeStr: BLANK_MODULE_CODE, enabled: false });
    buildModulesList();
    // Auto-open the editor for the new module
    const newItem = modulesList.querySelector(`[data-module-id="${id}"]`);
    newItem?.querySelector(".btn-module-edit")?.click();
    newItem?.scrollIntoView({ block: "nearest", behavior: "smooth" });
  });
}

init();
</script>
</body>
